# Pinned ruff config so `check.sh`, the pre-commit hook, and CI (goal 1) all
# agree on what "lint-clean" and "format-clean" mean — the definition of green
# must not drift with ruff's built-in defaults between versions.
#
# Rule selection is left at ruff's default (E4/E7/E9 + F): the pyflakes +
# pycodestyle-error set. Deliberately conservative — this gate is a floor, not
# a style crusade. Widen it in its own PR if we want more.

target-version = "py311"

# The e2e tooling venv is checked-out-adjacent, not code we own.
extend-exclude = [".venv-e2e", ".venv", "venv"]
