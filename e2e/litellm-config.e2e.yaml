# =============================================================================
# E2E LiteLLM config — the SAME gateway (SUT), but every backend points at the
# mockd daemon instead of a real Spark or Foundry. Proves protocol translation
# + fallback + auth + streaming with ZERO external dependencies.
#
# DELIBERATE SIMPLIFICATION vs deploy/litellm-config.yaml:
#   Every alias uses the `openai/` provider against mockd's OpenAI-compatible
#   surface — including the claude-* aliases. In production those use `azure_ai/`
#   (native Anthropic wire format on Foundry). The azure_ai/anthropic BACKEND
#   serialization cannot be faithfully mocked without reverse-engineering Azure's
#   surface, so it is validated ONLY against real Foundry (deploy/RUNBOOK.md).
#   What THIS config exercises is the balancer's own logic — CLIENT-side
#   translation (Anthropic-in, Responses-in), fallback, cooldown, key scoping,
#   streaming — which is provider-agnostic. That's the 90% you want in CI.
#
# The downstream `model:` names equal the client aliases on purpose: mockd keys
# its fault directives on the model it RECEIVES, so tests inject faults by the
# same name they request.
# =============================================================================

model_list:
  # ---- "Workbench" stand-in (a Spark serving a small model) ----------------
  - model_name: qwen3-coder
    litellm_params:
      model: openai/qwen3-coder
      api_base: http://mockd:9100/v1
      api_key: dummy
      # Bridge /v1/responses (Codex path) down to mockd's chat surface. This is
      # exactly Blocker A — with mockd it becomes a deterministic CI gate for
      # the bridge MECHANICS (streaming + tool-call translation both ways).
      use_chat_completions_api: true
    model_info:
      backend_tier: local
      agent_capable: true

  # ---- "Foundry" stand-ins (the always-up fallback tier) -------------------
  - model_name: claude-sonnet
    litellm_params:
      model: openai/claude-sonnet
      api_base: http://mockd:9100/v1
      api_key: dummy
      use_chat_completions_api: true
    model_info:
      backend_tier: foundry
      agent_capable: true

  - model_name: claude-opus
    litellm_params:
      model: openai/claude-opus
      api_base: http://mockd:9100/v1
      api_key: dummy
      use_chat_completions_api: true
    model_info:
      backend_tier: foundry
      agent_capable: true

  - model_name: gpt
    litellm_params:
      model: openai/gpt
      api_base: http://mockd:9100/v1
      api_key: dummy
      use_chat_completions_api: true
    model_info:
      backend_tier: foundry
      agent_capable: true

router_settings:
  # Same shape as prod: workbench falls through to the Foundry tier, Anthropic
  # family first (tool-call format consistency), GPT last.
  fallbacks:
    - qwen3-coder: ["claude-sonnet", "claude-opus", "gpt"]
    - claude-sonnet: ["claude-opus"]
  num_retries: 1          # low so fallback tests are fast + deterministic
  timeout: 30             # mockd is instant; no need for the prod 600s
  # DELIBERATELY DISABLED for the e2e suite (goal 6). Cooldown is in-memory,
  # time-based router state: once a deployment trips `allowed_fails`, the router
  # skips it for `cooldown_time`. Our fault tests intentionally flap qwen3-coder
  # (429/503), and the suite runs SERIALLY against ONE shared gateway — so that
  # cooldown bleeds into the *next* test, silently rerouting a request the next
  # test expected qwen3-coder to serve (mid-stream hangup, translation). mockd's
  # /__reset clears the backend fault but CANNOT clear gateway-side cooldown, so
  # the tests became order/timing-dependent and flaky. Cooldown is a latency
  # OPTIMIZATION, not a client-visible correctness contract; the contract we
  # actually assert is FALLBACK, which is exercised per-request via num_retries +
  # `fallbacks` above, independent of cooldown. So we disable cooldown here for
  # determinism. (Prod keeps it — see deploy/litellm-config.yaml.)
  disable_cooldowns: true

litellm_settings:
  drop_params: true

  # --- Wallet guardrails (goal 11) ------------------------------------------
  # EVERY virtual key the gateway mints inherits these unless the /key/generate
  # call sets the field explicitly. LiteLLM applies each entry only where the
  # request left the field None (see key_management_endpoints.py:
  # `default_key_generate_params`), so an explicit per-key override still wins.
  # Values are DELIBERATELY generous — they are a runaway-spend backstop for
  # unattended goal runs, not a throttle on normal traffic. Raise them per key
  # at issue time (`/key/generate {"max_budget": ..., "rpm_limit": ...}`) or
  # globally by editing here. See e2e/README.md "Budgets & rate limits".
  #
  # NOTE ON UNITS: max_budget is USD of *spend*, and spend = tokens x per-model
  # cost. These mock models carry no cost, so real dollar spend stays $0 here —
  # dollar-denominated enforcement (accruing spend past a budget) is proven in
  # goal 11b, which adds per-model costs + durable Postgres spend. What THIS
  # config + suite prove is that the budget and rate-limit GATES refuse an
  # over-limit key with a clean 4xx (never a 5xx or a hang), the client-visible
  # contract. The over-budget test uses an explicit max_budget:0 key to exercise
  # the `spend >= max_budget` gate deterministically without depending on async
  # spend flush or auth-cache TTL.
  default_key_generate_params:
    max_budget: 100          # USD, lifetime (no budget_duration reset window)
    rpm_limit: 60            # requests/min per key
    tpm_limit: 200000        # tokens/min per key

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
