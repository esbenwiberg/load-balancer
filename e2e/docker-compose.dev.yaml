# =============================================================================
# DEV STACK (goal 10) — the standing self-validation fleet. Unlike the e2e
# stack (ONE mockd, up-test-down), this brings up the gateway in front of THREE
# distinct mock backends and STAYS UP until you tear it down, so an agent
# building features (or a real Claude Code / Codex) can point at it and iterate.
#
#   docker compose -f docker-compose.dev.yaml up -d      # bring up, detached
#   ./dev_smoke.sh                                        # prove all 3 surfaces
#   docker compose -f docker-compose.dev.yaml down -v     # explicit teardown
#
# Topology:
#   :4000  litellm gateway   — clients + dev_smoke.sh hit this (SUT, unchanged)
#   :9101  workbench-a        — mockd, instance "workbench-a"  (a Spark slot)
#   :9102  workbench-b        — mockd, instance "workbench-b"  (2nd Spark slot)
#   :9103  foundry            — mockd, instance "mock-foundry" (always-up tier)
#   :9300  dashboard          — goal-12 "where did my prompt go?" viewer. Open
#                               http://localhost:9300 while the stack is up and
#                               watch every prompt's route land live.
#   :9400  control-plane      — goal-5 fleet state registry + heartbeat interface.
#                               Exposes per-model {warm,in_flight,healthy,
#                               agent_capable}. Goal 13 wires it live: each mockd
#                               workbench PUSHES heartbeats here (HEARTBEAT_URL),
#                               and the dashboard (:9300) reads it back via
#                               /api/fleet — so the fleet view shows real
#                               per-workbench models, health, and in-flight load
#                               as you drive traffic through :4000.
#   db     postgres           — LiteLLM virtual-key store (in-network only)
#
# Each mockd is host-published on a DISTINCT port so you can drive /__control at
# one instance without touching the others (per-instance faults). The gateway
# reaches them in-network by service name (workbench-a:9100, etc.).
# =============================================================================

x-mockd: &mockd
  # Stdlib-only daemon: any modern python image works, no pip install. The three
  # workbench/foundry services share this base and differ only by MOCKD_INSTANCE.
  image: python:3.12-slim
  working_dir: /app
  volumes:
    - ./mockd.py:/app/mockd.py:ro
  command: ["python", "mockd.py"]

services:
  db:
    image: postgres:16-alpine
    container_name: litellm-dev-db
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  workbench-a:
    <<: *mockd
    container_name: dev-workbench-a
    environment:
      MOCKD_PORT: "9100"
      MOCKD_HOST: "0.0.0.0"
      MOCKD_INSTANCE: "workbench-a"
      MOCKD_DEBUG: "${MOCKD_DEBUG:-}"
      # Goal 13 — push live heartbeats to the control-plane so the dashboard's
      # Fleet view shows this workbench, the model it carries, its health, and
      # its live in-flight count. workbench_id defaults to MOCKD_INSTANCE.
      HEARTBEAT_URL: "http://control-plane:9400"
      HEARTBEAT_MODELS: "qwen3-coder-a"
    ports:
      - "9101:9100"        # host-published so you can drive /__control per-instance
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  workbench-b:
    <<: *mockd
    container_name: dev-workbench-b
    environment:
      MOCKD_PORT: "9100"
      MOCKD_HOST: "0.0.0.0"
      MOCKD_INSTANCE: "workbench-b"
      MOCKD_DEBUG: "${MOCKD_DEBUG:-}"
      HEARTBEAT_URL: "http://control-plane:9400"
      HEARTBEAT_MODELS: "qwen3-coder-b"
    ports:
      - "9102:9100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  foundry:
    <<: *mockd
    container_name: dev-foundry
    environment:
      MOCKD_PORT: "9100"
      MOCKD_HOST: "0.0.0.0"
      MOCKD_INSTANCE: "mock-foundry"
      MOCKD_DEBUG: "${MOCKD_DEBUG:-}"
      # The always-up Foundry tier carries the three fallback aliases.
      HEARTBEAT_URL: "http://control-plane:9400"
      HEARTBEAT_MODELS: "claude-sonnet,claude-opus,gpt"
    ports:
      - "9103:9100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  dashboard:
    # Goal 12 — the read-only "where did my prompt go?" viewer + routing-record
    # sink. Leave the dev stack up and open http://localhost:9300 to watch routes
    # land live as you drive Claude Code / Codex / dev_smoke.sh through :4000.
    image: python:3.12-slim
    container_name: dev-dashboard
    working_dir: /app
    volumes:
      - ./dashboard.py:/app/dashboard.py:ro
    command: ["python", "dashboard.py"]
    environment:
      DASH_PORT: "9300"
      DASH_HOST: "0.0.0.0"
      # Goal 13 — read the live fleet from the control-plane and render it under
      # the Fleet section. In-network address; degrades to "fleet unavailable"
      # if the control-plane is ever down.
      CONTROL_PLANE_URL: "http://control-plane:9400"
    ports:
      - "9300:9300"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9300/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  control-plane:
    # Goal 5 — the Phase-1 control-plane skeleton: fleet state registry +
    # heartbeat interface. Stdlib-only (SQLite), no pip install. Comes up with
    # an empty registry; it REPORTS fleet state (per-model {warm, in_flight,
    # healthy, agent_capable}) and never picks a backend (routing policy is a
    # Needs-a-human decision — see docs/10). Goal 13 wires heartbeat producers.
    image: python:3.12-slim
    container_name: dev-control-plane
    working_dir: /app
    volumes:
      - ./control_plane.py:/app/control_plane.py:ro
    environment:
      CONTROL_PLANE_PORT: "9400"
      CONTROL_PLANE_HOST: "0.0.0.0"
      # In-container path; the registry is a cache of live state, so a fresh
      # /tmp on restart just means every row is instantly stale until re-beaten.
      CONTROL_PLANE_DB: "/tmp/control_plane.db"
    command: ["python", "control_plane.py"]
    ports:
      - "9400:9400"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9400/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  litellm:
    # Same pinned, vetted image as deploy/ + e2e/ (docs/03 risk 8 — never
    # 1.82.7/1.82.8). The check.sh pin guard enforces this exact tag.
    image: ghcr.io/berriai/litellm:v1.83.14-stable
    container_name: litellm-dev
    depends_on:
      workbench-a:
        condition: service_healthy
      workbench-b:
        condition: service_healthy
      foundry:
        condition: service_healthy
      dashboard:
        condition: service_healthy
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.dev.yaml:/app/config.yaml:ro
      # Observability callback (goal 3) — sits next to the config so LiteLLM can
      # import `obs_callback.routing_recorder` (it adds the config dir to sys.path).
      # The dev stack had NO obs wiring before goal 12; this + OBS_WEBHOOK_URL is
      # what makes the dashboard show live routes here.
      - ./obs_callback.py:/app/obs_callback.py:ro
    environment:
      # Test-only master key — NOT a secret. Overridable via .env.e2e / your env.
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-dev-master-test-key}"
      DATABASE_URL: "postgresql://litellm:litellm@db:5432/litellm"
      # Fan routing records to the dashboard sink (goal 12). Dev has no mockd
      # /__observe central sink (mockd here are the BACKENDS), so the dashboard
      # is the sole webhook target; stdout ROUTING_RECORD lines still emit too.
      OBS_WEBHOOK_URL: "http://dashboard:9300/records"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
