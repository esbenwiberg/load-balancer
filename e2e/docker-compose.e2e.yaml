# =============================================================================
# E2E stack: the real LiteLLM gateway (SUT) in front of the mockd backend.
# No Spark, no Foundry, no external network. Self-contained — `docker compose
# -f docker-compose.e2e.yaml up`.
#
#   :4000  LiteLLM gateway   — clients + the pytest suite hit this
#   :9100  mockd             — published so tests can POST /__control to inject
#                              faults; LiteLLM reaches it in-network at mockd:9100
#   :9300  dashboard         — goals 12+13 viewer; the gateway's obs_callback
#                              fans routing records here (as well as to
#                              mockd/__observe). GET / for the UI, GET
#                              /api/records for the routing data endpoint, GET
#                              /api/fleet for the control-plane fleet view. Both
#                              data endpoints are asserted by the suite.
#   :9400  control-plane     — goal-5 fleet registry. Here so the goal-13 fleet
#                              assertion can push heartbeats (host-published) and
#                              read them back through the dashboard's /api/fleet
#                              (in-network). Unlike the dev stack, NO mockd beats
#                              it — the test is the sole, deterministic producer.
# =============================================================================

services:
  # Postgres backs LiteLLM's virtual-key store — required to mint/scope per-user
  # keys (the attribution + revocation story). Test-only creds; ephemeral volume.
  db:
    image: postgres:16-alpine
    container_name: litellm-e2e-db
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  mockd:
    # Stdlib-only daemon: any modern python image works, no pip install.
    image: python:3.12-slim
    container_name: mockd
    working_dir: /app
    volumes:
      - ./mockd.py:/app/mockd.py:ro
    environment:
      MOCKD_PORT: "9100"
      MOCKD_HOST: "0.0.0.0"
      MOCKD_DEBUG: "${MOCKD_DEBUG:-}"
    command: ["python", "mockd.py"]
    ports:
      - "9100:9100"        # host-published so the test suite can drive /__control
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  dashboard:
    # Goal 12 — the read-only "where did my prompt go?" viewer + routing-record
    # sink. Stdlib-only daemon, same shape as mockd (no pip install).
    image: python:3.12-slim
    container_name: dashboard
    working_dir: /app
    volumes:
      - ./dashboard.py:/app/dashboard.py:ro
    environment:
      DASH_PORT: "9300"
      DASH_HOST: "0.0.0.0"
      # Goal 13: where the fleet view reads live state from. In-network address;
      # /api/fleet degrades gracefully if it's ever unreachable.
      CONTROL_PLANE_URL: "http://control-plane:9400"
    command: ["python", "dashboard.py"]
    ports:
      - "9300:9300"        # host-published so the pytest suite can read /api/records
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9300/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  control-plane:
    # Goal 5 — fleet state registry + heartbeat interface. Present in the e2e
    # stack (goal 13) so the fleet assertion can POST /heartbeat (host-published
    # :9400) and read it back through the dashboard's /api/fleet. Stdlib-only
    # (SQLite), no pip install. NO mockd here beats it: the test is the sole,
    # deterministic heartbeat producer (the dev stack is where mockd beats live).
    image: python:3.12-slim
    container_name: control-plane-e2e
    working_dir: /app
    volumes:
      - ./control_plane.py:/app/control_plane.py:ro
    environment:
      CONTROL_PLANE_PORT: "9400"
      CONTROL_PLANE_HOST: "0.0.0.0"
      CONTROL_PLANE_DB: "/tmp/control_plane.db"
    command: ["python", "control_plane.py"]
    ports:
      - "9400:9400"        # host-published so the pytest suite can push heartbeats
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9400/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  litellm:
    # Same pinned, vetted image as deploy/ (docs/03 risk 8 — never 1.82.7/1.82.8).
    image: ghcr.io/berriai/litellm:v1.83.14-stable
    container_name: litellm-e2e
    depends_on:
      mockd:
        condition: service_healthy
      dashboard:
        condition: service_healthy
      control-plane:
        condition: service_healthy
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.e2e.yaml:/app/config.yaml:ro
      # Observability callback (goal 3) — sits next to the config so LiteLLM can
      # import `obs_callback.routing_recorder` (it adds the config dir to sys.path).
      - ./obs_callback.py:/app/obs_callback.py:ro
    environment:
      # Test-only master key — NOT a secret. Overridable via .env.e2e.
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-e2e-master-test-key}"
      # LiteLLM runs its prisma migrations against this on boot; enables the
      # /key/generate virtual-key store.
      DATABASE_URL: "postgresql://litellm:litellm@db:5432/litellm"
      # Observability sinks (goal 3 + goal 12): the routing-record callback fans
      # each record out to BOTH sinks (comma-separated). mockd/__observe backs
      # the goal-3 suite (read records back, assert a fallback is captured); the
      # dashboard/records sink backs the goal-12 viewer + its data-endpoint test.
      # In-network addresses; each is a single process so it centralizes records
      # across BOTH litellm workers (--num_workers 2).
      OBS_WEBHOOK_URL: "http://mockd:9100/__observe,http://dashboard:9300/records"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
